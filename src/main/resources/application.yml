spring:
  application:
    name: ms-reservas

  profiles:
    active: dev


  datasource:
    url: jdbc:mysql://localhost:3306/reservas_db
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8082

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    status-page-url: http://localhost:8082/doc/swagger-ui.html

