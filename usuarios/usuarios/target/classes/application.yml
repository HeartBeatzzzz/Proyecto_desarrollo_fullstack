# URLs de otros servicios
usuarios:
  service:
    url: http://localhost:8081
reservas:
  service:
    url: http://localhost:8082

# Aplicacion

# Base de datos, JPA, Flyway y Application Name
spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/usuarios_db
    username: root
    password: ""
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  application:
    name: servicio-usuarios
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true   # Hace que el Gateway cree rutas automáticas.
          lower-case-service-id: true

# Servidor
server:
  port: 8081

# Seguridad simple para desarrollo
app:
  security:
    admin:
      username: admin
      password: admin123
    user:
      username: usuario
      password: usuario123

# Testing y documentación con Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.htm
  # Configuración de Basic Auth para Swagger UI
  security-schemes:
    basicAuth:
      type: http
      scheme: basic
  security-requirements:
    - basicAuth: []

eureka:
  instance:
    hostname: localhost
    lease-renewal-interval-in-seconds: 30      # Frecuencia del "latido" (heartbeat).
    lease-expiration-duration-in-seconds: 90   # Tiempo de espera tras fallar los latidos.
  client:
    registerWithEureka: false  # El servidor no se registra a sí mismo.
    fetchRegistry: false        # El servidor no necesita obtener el registro.
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    enable-self-preservation: true
    eviction-interval-timer-in-ms: 60000