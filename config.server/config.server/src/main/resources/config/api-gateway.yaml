spring:
  application:
    name: api-gateway
  config:
    import: "optional:configserver:http://localhost:8088" #Adaptado a config server
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: usuario-service
          uri: lb://servicio-usuarios   #indica balanceo de carga con Eureka
          predicates:
            - Path=/usuarios/**
          filters:
            - StripPrefix=1            # Elimina el segmento (usuarios) al reenviar

server:
  port: 8080

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/  # Unir con URL de eureka
    register-with-eureka: true         #El gateway también se registra
    fetch-registry: true               # Obtener lista de servicios

logging:
  level:
    org.springframework.cloud.gateway: DEBUG   # Sirve para depurar